<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Risk: What Do You Actually Know?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111111;
      --white: #1c1c1c;
      --border: #2e2e2e;
      --text: #e8e5e0;
      --muted: #8a8a8a;
      --primary: #5090f5;
      --primary-light: rgba(80, 144, 245, 0.12);
      --primary-dark: #3b7de8;
      --green: #4ade80;
      --green-bg: #052e14;
      --green-border: #166534;
      --red: #f87171;
      --red-bg: #3b0909;
      --red-border: #7f1d1d;
      --amber-bg: #1c1306;
      --amber-border: #78350f;
      --amber-text: #fbbf24;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.6), 0 4px 10px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      font-size: 15px;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    #screen-results.active {
      justify-content: flex-start;
      padding: 0;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px;
      width: 100%;
      max-width: 640px;
    }

    /* Welcome */
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 14px;
    }
    .welcome-title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }
    .welcome-desc {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 28px;
      line-height: 1.75;
    }
    .mode-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .mode-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      background: var(--white);
      transition: border-color 0.12s, background 0.12s;
      text-align: left;
      width: 100%;
      gap: 16px;
    }
    .mode-btn:hover { border-color: var(--primary); background: var(--primary-light); }
    .mode-btn-left { display: flex; flex-direction: column; gap: 2px; }
    .mode-btn-title { font-weight: 700; font-size: 15px; color: var(--text); }
    .mode-btn-desc { font-size: 12px; color: var(--muted); }
    .mode-btn-badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-brief { background: #052e14; color: #4ade80; }
    .badge-full  { background: #1e3358; color: #93c5fd; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
    }
    .btn-primary { background: var(--primary); color: white; width: 100%; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 14px;
      padding: 10px 20px;
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-outline {
      background: var(--white);
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .btn-outline:hover { background: var(--primary-light); }

    /* Progress */
    .progress-bar-wrap { width: 100%; max-width: 640px; margin-bottom: 14px; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.35s ease; }

    /* Quiz */
    .question-text {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 22px;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 15px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      background: var(--white);
      text-align: left;
      width: 100%;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
    }
    .quiz-option:hover:not([disabled]) { border-color: var(--primary); background: var(--primary-light); }
    .quiz-option[disabled] { cursor: default; }
    .quiz-option.correct  { border-color: var(--green); background: var(--green-bg); }
    .quiz-option.wrong    { border-color: var(--red);   background: var(--red-bg);   }
    .quiz-option.revealed { border-color: var(--green); background: var(--green-bg); opacity: 0.75; }

    .opt-letter {
      width: 26px; height: 26px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0; color: var(--muted); margin-top: 1px;
    }
    .quiz-option.correct  .opt-letter { background: var(--green); border-color: var(--green); color: white; }
    .quiz-option.wrong    .opt-letter { background: var(--red);   border-color: var(--red);   color: white; }
    .quiz-option.revealed .opt-letter { background: var(--green); border-color: var(--green); color: white; }

    .explanation {
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--amber-bg);
      border: 1px solid var(--amber-border);
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--amber-text);
      line-height: 1.65;
      display: none;
    }
    .explanation.visible { display: block; }
    .explanation-label { font-weight: 700; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

    .quiz-footer { display: flex; justify-content: flex-end; margin-top: 20px; }
    .quiz-footer.hidden { display: none; }

    /* Results */
    .results-hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      padding: 52px 24px 44px;
      text-align: center;
      color: white;
    }
    .results-eyebrow {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      opacity: 0.6; margin-bottom: 12px;
    }
    .results-score-big {
      font-size: 64px; font-weight: 900;
      letter-spacing: -2px; line-height: 1;
      margin-bottom: 8px;
    }
    .results-score-label { font-size: 16px; opacity: 0.75; margin-bottom: 20px; }
    .results-profile-name {
      font-size: 22px; font-weight: 700;
      margin-bottom: 14px; letter-spacing: -0.3px;
    }
    .results-narrative {
      font-size: 14px; opacity: 0.82;
      max-width: 500px; margin: 0 auto; line-height: 1.75;
    }

    .results-body {
      max-width: 680px;
      margin: 0 auto;
      padding: 44px 28px 60px;
      width: 100%;
    }

    .section-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--muted); margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .results-section { margin-bottom: 40px; }

    /* Missed questions review */
    .missed-list { display: flex; flex-direction: column; gap: 14px; }
    .missed-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .missed-q { font-size: 13px; font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
    .missed-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; margin-bottom: 4px; }
    .missed-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.3px;
      white-space: nowrap; flex-shrink: 0; margin-top: 1px;
    }
    .tag-yours    { background: var(--red-bg);   color: var(--red);   }
    .tag-correct  { background: var(--green-bg); color: var(--green); }
    .missed-explanation {
      margin-top: 10px; padding: 10px 12px;
      background: var(--amber-bg); border: 1px solid var(--amber-border);
      border-radius: 6px; font-size: 12.5px; color: var(--amber-text); line-height: 1.6;
    }
    .all-correct-box {
      background: var(--green-bg); border: 1px solid var(--green-border);
      border-radius: 10px; padding: 20px;
      text-align: center; color: var(--green); font-weight: 600;
    }

    /* CTA Widget */
    .cta-widget {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .cta-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .cta-tab {
      flex: 1;
      padding: 12px 6px;
      font-size: 12px; font-weight: 600;
      border: none; background: transparent;
      cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color 0.12s, border-color 0.12s;
      text-align: center;
      line-height: 1.3;
    }
    .cta-tab:hover { color: var(--text); }
    .cta-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--white); }

    .cta-panel { display: none; padding: 24px; }
    .cta-panel.active { display: block; }

    .cta-iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 6px;
    }
    .cta-iframe-fallback {
      display: none;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .cta-action h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .cta-action p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    .cta-action .btn-cta {
      display: inline-flex;
      align-items: center;
      padding: 12px 20px;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      font-size: 14px; font-weight: 600;
      text-decoration: none;
      transition: background 0.12s;
      margin-bottom: 20px;
    }
    .cta-action .btn-cta:hover { background: var(--primary-dark); }
    .cta-subhead { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; margin-top: 4px; }
    .cta-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .cta-list li {
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px; line-height: 1.6;
    }
    .cta-list li strong { display: block; margin-bottom: 2px; font-size: 13px; }
    .cta-list li a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .cta-list li a:hover { text-decoration: underline; }

    .other-list { display: flex; flex-direction: column; gap: 10px; }
    .other-item {
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px; line-height: 1.6;
    }
    .other-item strong { display: block; font-size: 13px; margin-bottom: 3px; }
    .other-item a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .other-item a:hover { text-decoration: underline; }

    /* Reflection screen */
    .reflection-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--primary); margin-bottom: 14px;
    }
    .reflection-question {
      font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 10px;
    }
    .reflection-context {
      font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6;
    }
    .reflection-textarea {
      width: 100%; min-height: 120px;
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 12px 14px; font-size: 14px; font-family: inherit;
      color: var(--text); background: var(--bg);
      resize: vertical; line-height: 1.6;
      transition: border-color 0.12s; outline: none;
    }
    .reflection-textarea:focus { border-color: var(--primary); }
    .reflection-textarea::placeholder { color: var(--muted); opacity: 0.6; }
    .word-count { font-size: 12px; color: var(--muted); margin-top: 8px; display: block; }
    .word-count.valid { color: var(--green); }

    /* Reflection results */
    .reflections-list { display: flex; flex-direction: column; gap: 14px; }
    .reflection-result {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px;
    }
    .reflection-result-q { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    .reflection-result-a { font-size: 14px; line-height: 1.65; color: var(--text); }

    /* Org list */
    .org-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .org-item {
      display: block; padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; text-decoration: none;
      transition: border-color 0.12s;
    }
    .org-item:hover { border-color: var(--primary); }
    .org-item strong { display: block; font-size: 13px; color: var(--text); margin-bottom: 2px; }
    .org-item span { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* Share */
    .share-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .share-row .btn { flex: 1; min-width: 140px; font-size: 13px; padding: 11px 16px; }
    .results-actions { display: flex; gap: 12px; margin-top: 4px; }
    .results-actions .btn { flex: 1; }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a; color: white;
      padding: 11px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      z-index: 9999; opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: slideUp 0.28s ease forwards; }

    @media (max-width: 580px) {
      .card { padding: 24px 20px; }
      .results-body { padding: 28px 16px 48px; }
      .results-score-big { font-size: 48px; }
      .results-actions { flex-direction: column; }
      .cta-tab { font-size: 11px; padding: 10px 4px; }
    }

    @media print {
      body { background: white; }
      .results-actions, .share-row, #toast, .cta-widget { display: none !important; }
      .results-hero { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }

    /* Comprehension blocks */
    .passage-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--primary);
      border-radius: 8px;
      padding: 18px 20px;
    }
    .passage-eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--primary); margin-bottom: 8px;
    }
    .passage-title {
      font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--text);
    }
    .passage-text {
      font-size: 14px; line-height: 1.85; color: var(--text);
    }
    .comp-subq {
      border-top: 1px solid var(--border);
      padding-top: 20px; margin-top: 20px;
    }
    .comp-subq-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .comp-subq-text {
      font-size: 16px; font-weight: 600; line-height: 1.5;
      margin-bottom: 16px; color: var(--text);
    }
    .quiz-option.selected-comp { border-color: var(--primary); background: var(--primary-light); }
    .quiz-option.selected-comp .opt-letter { background: var(--primary); border-color: var(--primary); color: white; }
    .keyword-feedback { margin-top: 12px; }
    .kw-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .kw-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .kw-chip { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .kw-chip.found  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .kw-chip.missing { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); opacity: 0.55; }
    .missed-passage-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--primary); margin-bottom: 6px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active">
    <div class="card animate-in">
      <div class="eyebrow">AI Safety &nbsp;·&nbsp; Knowledge Exam</div>
      <h1 class="welcome-title">AI risk: what do you actually know?</h1>
      <p class="welcome-desc">
        This is a factual exam on AI risk — historical record, published research,
        expert estimates. Not a conceptual quiz. Not multiple opinions. Facts with right answers.
      </p>
      <div class="mode-btns">
        <button class="mode-btn" onclick="startQuiz('brief')">
          <div class="mode-btn-left">
            <div class="mode-btn-title">Quick exam</div>
            <div class="mode-btn-desc">8 questions &nbsp;&middot;&nbsp; about 5 minutes</div>
          </div>
          <span class="mode-btn-badge badge-brief">Brief</span>
        </button>
        <button class="mode-btn" onclick="startQuiz('full')">
          <div class="mode-btn-left">
            <div class="mode-btn-title">Full exam</div>
            <div class="mode-btn-desc">Questions &amp; passages &nbsp;&middot;&nbsp; about 25 minutes</div>
          </div>
          <span class="mode-btn-badge badge-full">Comprehensive</span>
        </button>
      </div>
    </div>
  </div>

  <!-- REFLECTION -->
  <div id="screen-reflection" class="screen"></div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="progress-bar-wrap" id="quiz-progress-wrap"></div>
    <div class="card animate-in" id="quiz-card"></div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen"></div>

</div>

<script>
// ─────────────────────────────────────
// QUESTIONS
// ─────────────────────────────────────

const ALL_QUESTIONS = [
  {
    id: 'q1',
    text: 'When was humanity first warned in writing that machines might surpass human intelligence?',
    options: [
      '1950 — Alan Turing, "Computing Machinery and Intelligence"',
      '1863 — Samuel Butler, "Darwin Among the Machines"',
      '1956 — the Dartmouth Conference, birth of AI as a field',
      '2014 — Nick Bostrom, "Superintelligence"'
    ],
    correct: 1,
    explanation: 'Samuel Butler\'s 1863 essay "Darwin Among the Machines" proposed that machines were evolving and would eventually surpass human intelligence — 160 years ago. Alan Turing then clarified the specific danger in 1951, warning that AGIs surpassing human intelligence would likely "take control."'
  },
  {
    id: 'q2',
    text: 'What did Alan Turing specifically warn in 1951 would happen when machines surpassed human intelligence?',
    options: [
      'They would still be controllable through careful programming',
      'They would accelerate scientific discovery but remain tools',
      'They would likely "take control"',
      'Humanity should not develop them under any circumstances'
    ],
    correct: 2,
    explanation: 'In a 1951 lecture, Turing proposed that AGIs surpassing human intelligence would likely "take control" — a remarkably prescient warning. This is distinct from his 1950 paper, which asked whether machines could think. existentialsafety.org traces the first warning to Butler in 1863, and the clarification of the danger to Turing in 1951.'
  },
  {
    id: 'q3',
    text: 'How likely is AI to kill you?',
    options: [
      'Less than 1 in 1,000 — under 0.1%',
      'Roughly 1 in 200 — around 0.5%',
      'Roughly 1 in 10 to 1 in 20 — around 5–10%',
      'Greater than 1 in 4 — over 25%'
    ],
    correct: 2,
    explanation: 'The median estimate from a 2022 survey of AI researchers puts the probability of human extinction or civilizational catastrophe from AI at 5–10% this century. Toby Ord independently estimated 10% in "The Precipice" (2020). For someone alive today who will live through most of this century, that is your approximate personal lifetime risk — comparable to or exceeding lifetime odds of dying from stroke in the US. The tool ai-mortality.web.app, built by existentialsafety.org, lets you calculate this for your specific birth year.'
  },
  {
    id: 'q4',
    text: 'In a 2022 survey of AI researchers, what share believed there is a 10% or greater chance that AI causes an existential catastrophe?',
    options: [
      'Fewer than 1 in 20',
      'About 1 in 10',
      'One-third to one-half',
      'About two-thirds'
    ],
    correct: 2,
    explanation: 'A 2022 survey found that between one-third and one-half of AI researchers assigned a 10% or greater probability to AI causing an existential catastrophe. The median estimate was 5–10%. These are the people building these systems — not science fiction writers or journalists.'
  },
  {
    id: 'q5',
    text: 'Approximately how many people globally are estimated to be working specifically on existential risks from AI?',
    options: [
      'Around 100',
      'Around 1,100',
      'Around 10,000',
      'Around 100,000'

// ─────────────────────────────────────
// HELPERS
// ─────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(q) {
  if (q.type === 'comprehension') return q;
  const perm = [0, 1, 2, 3];
  for (let i = perm.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  return { ...q, options: perm.map(i => q.options[i]), correct: perm.indexOf(q.correct) };
}

function computeResults() {
  const totalCorrect = state.answers.filter(a => a.correct).length;
  const totalQuestions = state.answers.length;
  const overallPct = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;
  const profile = PROFILES.find(p => overallPct >= p.min && overallPct <= p.max) || PROFILES[0];
  return { totalCorrect, totalQuestions, overallPct, profile };
}

// ─────────────────────────────────────
// QUIZ
// ─────────────────────────────────────

function startQuiz(mode) {
  state.mode = mode;
  const count = mode === 'brief' ? 8 : ALL_QUESTIONS.length;
  state.questions = ALL_QUESTIONS.slice(0, count).map(shuffle);
  state.currentQ = 0;
  state.answers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentQ];
  const total = state.questions.length;
  const pct = Math.round((state.currentQ / total) * 100);

  document.getElementById('quiz-progress-wrap').innerHTML = `
    <div class="progress-meta">
      <span>Question ${state.currentQ + 1} of ${total}</span>
      <span>${pct}% complete</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>`;

  if (q.type === 'comprehension') { renderComprehensionBlock(q); return; }

  const letters = ['A', 'B', 'C', 'D'];
  const card = document.getElementById('quiz-card');

  card.innerHTML = `
    <div class="question-text">${q.text}</div>
    <div class="quiz-options" id="options-wrap">
      ${q.options.map((opt, i) => `
        <button class="quiz-option" onclick="selectAnswer(${i})" id="opt-${i}">
          <span class="opt-letter">${letters[i]}</span>
          <span>${opt}</span>
        </button>`).join('')}
    </div>
    <div class="explanation" id="explanation">
      <div class="explanation-label">Why</div>
      <div id="explanation-text"></div>
    </div>
    <div class="quiz-footer hidden" id="quiz-footer">
      <button class="btn btn-primary" style="width:auto;padding:12px 28px;" onclick="nextQuestion()">
        ${state.currentQ < state.questions.length - 1 ? 'Next question &rarr;' : 'See results &rarr;'}
      </button>
    </div>`;

  card.classList.remove('animate-in');
  void card.offsetWidth;
  card.classList.add('animate-in');
}

function selectAnswer(selectedIdx) {
  const q = state.questions[state.currentQ];
  const isCorrect = selectedIdx === q.correct;

  state.answers.push({
    qid: q.id,
    text: q.text,
    options: q.options,
    selectedIdx,
    correctIdx: q.correct,
    correct: isCorrect,
    explanation: q.explanation
  });

  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.setAttribute('disabled', true));
  opts[selectedIdx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) opts[q.correct].classList.add('revealed');

  document.getElementById('explanation-text').textContent = q.explanation;
  document.getElementById('explanation').classList.add('visible');
  document.getElementById('quiz-footer').classList.remove('hidden');
}

function nextQuestion() {
  state.currentQ++;
  if (state.currentQ < state.questions.length) {
    renderQuestion();
  } else {
    state.currentR = 0;
    state.reflections = [];
    renderReflection();
  }
}

function renderComprehensionBlock(q) {
  state.compDraft = {};
  const isLast = state.currentQ === state.questions.length - 1;
  const letters = ['A', 'B', 'C', 'D'];

  const subqHTML = q.subquestions.map((sq, i) => {
    if (sq.type === 'mcq') {
      return `
        <div class="comp-subq" id="subq-wrap-${sq.id}">
          <div class="comp-subq-label">Question ${i + 1}</div>
          <div class="comp-subq-text">${sq.text}</div>
          <div class="comp-options">
            ${sq.options.map((opt, j) => `
              <button class="quiz-option" onclick="selectCompAnswer('${sq.id}',${j})" id="compopt-${sq.id}-${j}">
                <span class="opt-letter">${letters[j]}</span>
                <span>${opt}</span>
              </button>`).join('')}
          </div>
          <div class="explanation" id="comp-exp-${sq.id}">
            <div class="explanation-label">Why</div>
            <div>${sq.explanation}</div>
          </div>
        </div>`;
    } else {
      return `
        <div class="comp-subq" id="subq-wrap-${sq.id}">
          <div class="comp-subq-label">Question ${i + 1}</div>
          <div class="comp-subq-text">${sq.text}</div>
          <textarea class="reflection-textarea" id="comptext-${sq.id}"
            placeholder="${sq.placeholder || 'Write your answer here...'}"
            oninput="onCompTextInput('${sq.id}',this)"></textarea>
          <span class="word-count" id="compwc-${sq.id}">0 words — write at least 10 to continue</span>
          <div class="explanation" id="comp-exp-${sq.id}">
            <div class="explanation-label">Why</div>
            <div>${sq.explanation}</div>
          </div>
        </div>`;
    }
  }).join('');

  const card = document.getElementById('quiz-card');
  card.innerHTML = `
    <div class="passage-block">
      <div class="passage-eyebrow">Read the following passage</div>
      ${q.passageTitle ? `<div class="passage-title">${q.passageTitle}</div>` : ''}
      <div class="passage-text">${q.passage}</div>
    </div>
    ${subqHTML}
    <div style="margin-top:24px;" id="comp-submit-wrap">
      <button class="btn btn-primary" id="comp-submit-btn" disabled onclick="submitComprehensionBlock('${q.id}')">
        Submit answers
      </button>
    </div>
    <div class="quiz-footer hidden" id="quiz-footer">
      <button class="btn btn-primary" style="width:auto;padding:12px 28px;" onclick="nextQuestion()">
        ${isLast ? 'See results &rarr;' : 'Next question &rarr;'}
      </button>
    </div>`;

  card.classList.remove('animate-in');
  void card.offsetWidth;
  card.classList.add('animate-in');
}

function selectCompAnswer(subqId, idx) {
  state.compDraft[subqId] = idx;
  const wrap = document.getElementById(`subq-wrap-${subqId}`);
  wrap.querySelectorAll('.quiz-option').forEach((opt, i) => {
    opt.classList.toggle('selected-comp', i === idx);
  });
  checkCompAllAnswered();
}

function onCompTextInput(subqId, textarea) {
  const words = textarea.value.trim().split(/\s+/).filter(w => w.length > 0);
  const wc = document.getElementById(`compwc-${subqId}`);
  if (words.length >= 10) {
    state.compDraft[subqId] = textarea.value.trim();
    wc.textContent = `${words.length} words`;
    wc.classList.add('valid');
  } else {
    delete state.compDraft[subqId];
    wc.textContent = `${words.length} words — write at least 10 to continue`;
    wc.classList.remove('valid');
  }
  checkCompAllAnswered();
}

function checkCompAllAnswered() {
  const q = state.questions[state.currentQ];
  const allDone = q.subquestions.every(sq => state.compDraft[sq.id] !== undefined);
  const btn = document.getElementById('comp-submit-btn');
  if (btn) btn.disabled = !allDone;
}

function submitComprehensionBlock(blockId) {
  const q = state.questions[state.currentQ];

  q.subquestions.forEach(sq => {
    const draft = state.compDraft[sq.id];

    if (sq.type === 'mcq') {
      const selectedIdx = draft;
      const correctIdx = sq.correct;
      const correct = selectedIdx === correctIdx;
      const wrap = document.getElementById(`subq-wrap-${sq.id}`);
      wrap.querySelectorAll('.quiz-option').forEach((opt, i) => {
        opt.setAttribute('disabled', true);
        opt.classList.remove('selected-comp');
        if (i === selectedIdx) opt.classList.add(correct ? 'correct' : 'wrong');
        if (i === correctIdx && !correct) opt.classList.add('revealed');
      });
      state.answers.push({
        qid: sq.id, text: sq.text, subtype: 'mcq',
        passageTitle: q.passageTitle, options: sq.options,
        selectedIdx, correctIdx, correct, explanation: sq.explanation
      });

    } else {
      const keywords = sq.keywords || [];
      const minRequired = sq.minKeywords || 2;
      const lower = draft.toLowerCase();
      const detected = keywords.filter(k => lower.includes(k.toLowerCase()));
      const correct = detected.length >= minRequired;
      const textarea = document.getElementById(`comptext-${sq.id}`);
      if (textarea) textarea.disabled = true;
      const wrap = document.getElementById(`subq-wrap-${sq.id}`);
      const kwHTML = `
        <div class="keyword-feedback">
          <div class="kw-label">Keywords detected (${detected.length} of ${minRequired} needed to pass):</div>
          <div class="kw-chips">
            ${keywords.map(k => `<span class="kw-chip ${detected.map(d => d.toLowerCase()).includes(k.toLowerCase()) ? 'found' : 'missing'}">${k}</span>`).join('')}
          </div>
        </div>`;
      const expEl = document.getElementById(`comp-exp-${sq.id}`);
      if (expEl) expEl.insertAdjacentHTML('beforebegin', kwHTML);
      state.answers.push({
        qid: sq.id, text: sq.text, subtype: 'text',
        passageTitle: q.passageTitle, answer: draft,
        keywords, detected, correct, explanation: sq.explanation
      });
    }

    const expEl = document.getElementById(`comp-exp-${sq.id}`);
    if (expEl) expEl.classList.add('visible');
  });

  document.getElementById('comp-submit-wrap').style.display = 'none';
  document.getElementById('quiz-footer').classList.remove('hidden');
}

// ─────────────────────────────────────
// REFLECTION
// ─────────────────────────────────────

function renderReflection() {
  const r = REFLECTION_QUESTIONS[state.currentR];
  const total = REFLECTION_QUESTIONS.length;
  const pct = Math.round((state.currentR / total) * 100);
  const isLast = state.currentR === total - 1;

  showScreen('screen-reflection');
  document.getElementById('screen-reflection').innerHTML = `
    <div class="progress-bar-wrap" style="width:100%;max-width:640px;margin-bottom:14px;">
      <div class="progress-meta">
        <span>Reflection ${state.currentR + 1} of ${total}</span>
        <span>${pct}% complete</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="card animate-in" style="max-width:640px;width:100%;">
      <div class="reflection-eyebrow">Reflect</div>
      <div class="reflection-question">${r.text}</div>
      <div class="reflection-context">${r.context}</div>
      <textarea id="reflection-input" class="reflection-textarea"
        placeholder="Write your thoughts here..."
        oninput="onReflectionInput(this)"></textarea>
      <span class="word-count" id="word-count">0 words — write at least 10 to continue</span>
      <div style="margin-top:20px;">
        <button class="btn btn-primary" id="reflection-btn" disabled onclick="submitReflection()">
          ${isLast ? 'See results &rarr;' : 'Continue &rarr;'}
        </button>
      </div>
    </div>`;
}

function onReflectionInput(textarea) {
  const words = textarea.value.trim().split(/\s+/).filter(w => w.length > 0);
  const count = words.length;
  const countEl = document.getElementById('word-count');
  const btn = document.getElementById('reflection-btn');
  if (count >= 10) {
    countEl.textContent = `${count} words`;
    countEl.classList.add('valid');
    btn.removeAttribute('disabled');
  } else {
    countEl.textContent = `${count} words — write at least 10 to continue`;
    countEl.classList.remove('valid');
    btn.setAttribute('disabled', true);
  }
}

function submitReflection() {
  const text = document.getElementById('reflection-input').value.trim();
  state.reflections.push({ question: REFLECTION_QUESTIONS[state.currentR].text, answer: text });
  state.currentR++;
  if (state.currentR < REFLECTION_QUESTIONS.length) {
    renderReflection();
  } else {
    showResults();
  }
}

// ─────────────────────────────────────
// CTA WIDGET
// ─────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.cta-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.cta-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.cta-tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

function iframeLoaded() {
  const iframe = document.getElementById('reps-iframe');
  if (iframe) iframe.style.display = 'block';
}

function iframeFailed() {
  const iframe = document.getElementById('reps-iframe');
  const fallback = document.getElementById('reps-fallback');
  if (iframe) iframe.style.display = 'none';
  if (fallback) fallback.style.display = 'block';
}

// ─────────────────────────────────────
// SHARE
// ─────────────────────────────────────

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2600);
}

function copyScore() {
  const { totalCorrect, totalQuestions, overallPct, profile } = computeResults();
  const url = window.location.href;
  const text = `I scored ${overallPct}% on the AI Risk Knowledge Exam — "${profile.name}" (${totalCorrect}/${totalQuestions} correct).\n\nTake it: ${url}`;
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
}

function shareAssessment() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: 'AI Risk: What Do You Actually Know?', text: 'A factual exam on AI risk. Most people fail.', url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied'));
  }
}

function resetQuiz() {
  state = { mode: 'brief', questions: [], currentQ: 0, answers: [], reflections: [], currentR: 0 };
  showScreen('screen-welcome');
}
