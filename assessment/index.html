<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Risk: What Do You Actually Know?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111111;
      --white: #1c1c1c;
      --border: #2e2e2e;
      --text: #e8e5e0;
      --muted: #8a8a8a;
      --primary: #5090f5;
      --primary-light: rgba(80, 144, 245, 0.12);
      --primary-dark: #3b7de8;
      --green: #4ade80;
      --green-bg: #052e14;
      --green-border: #166534;
      --red: #f87171;
      --red-bg: #3b0909;
      --red-border: #7f1d1d;
      --amber-bg: #1c1306;
      --amber-border: #78350f;
      --amber-text: #fbbf24;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.6), 0 4px 10px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      font-size: 15px;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    #screen-results.active {
      justify-content: flex-start;
      padding: 0;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px;
      width: 100%;
      max-width: 640px;
    }

    /* Welcome */
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 14px;
    }
    .welcome-title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }
    .welcome-desc {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 28px;
      line-height: 1.75;
    }
    .mode-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .mode-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      background: var(--white);
      transition: border-color 0.12s, background 0.12s;
      text-align: left;
      width: 100%;
      gap: 16px;
    }
    .mode-btn:hover { border-color: var(--primary); background: var(--primary-light); }
    .mode-btn-left { display: flex; flex-direction: column; gap: 2px; }
    .mode-btn-title { font-weight: 700; font-size: 15px; color: var(--text); }
    .mode-btn-desc { font-size: 12px; color: var(--muted); }
    .mode-btn-badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-brief { background: #052e14; color: #4ade80; }
    .badge-full  { background: #1e3358; color: #93c5fd; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
    }
    .btn-primary { background: var(--primary); color: white; width: 100%; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 14px;
      padding: 10px 20px;
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-outline {
      background: var(--white);
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .btn-outline:hover { background: var(--primary-light); }

    /* Progress */
    .progress-bar-wrap { width: 100%; max-width: 640px; margin-bottom: 14px; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.35s ease; }

    /* Quiz */
    .question-text {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 22px;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .quiz-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 15px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      background: var(--white);
      text-align: left;
      width: 100%;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
    }
    .quiz-option:hover:not([disabled]) { border-color: var(--primary); background: var(--primary-light); }
    .quiz-option[disabled] { cursor: default; }
    .quiz-option.correct  { border-color: var(--green); background: var(--green-bg); }
    .quiz-option.wrong    { border-color: var(--red);   background: var(--red-bg);   }
    .quiz-option.revealed { border-color: var(--green); background: var(--green-bg); opacity: 0.75; }

    .opt-letter {
      width: 26px; height: 26px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0; color: var(--muted); margin-top: 1px;
    }
    .quiz-option.correct  .opt-letter { background: var(--green); border-color: var(--green); color: white; }
    .quiz-option.wrong    .opt-letter { background: var(--red);   border-color: var(--red);   color: white; }
    .quiz-option.revealed .opt-letter { background: var(--green); border-color: var(--green); color: white; }

    .explanation {
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--amber-bg);
      border: 1px solid var(--amber-border);
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--amber-text);
      line-height: 1.65;
      display: none;
    }
    .explanation.visible { display: block; }
    .explanation-label { font-weight: 700; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

    .quiz-footer { display: flex; justify-content: flex-end; margin-top: 20px; }
    .quiz-footer.hidden { display: none; }

    /* Results */
    .results-hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      padding: 52px 24px 44px;
      text-align: center;
      color: white;
    }
    .results-eyebrow {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      opacity: 0.6; margin-bottom: 12px;
    }
    .results-score-big {
      font-size: 64px; font-weight: 900;
      letter-spacing: -2px; line-height: 1;
      margin-bottom: 8px;
    }
    .results-score-label { font-size: 16px; opacity: 0.75; margin-bottom: 20px; }
    .results-profile-name {
      font-size: 22px; font-weight: 700;
      margin-bottom: 14px; letter-spacing: -0.3px;
    }
    .results-narrative {
      font-size: 14px; opacity: 0.82;
      max-width: 500px; margin: 0 auto; line-height: 1.75;
    }

    .results-body {
      max-width: 680px;
      margin: 0 auto;
      padding: 44px 28px 60px;
      width: 100%;
    }

    .section-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--muted); margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .results-section { margin-bottom: 40px; }

    /* Missed questions review */
    .missed-list { display: flex; flex-direction: column; gap: 14px; }
    .missed-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .missed-q { font-size: 13px; font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
    .missed-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; margin-bottom: 4px; }
    .missed-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.3px;
      white-space: nowrap; flex-shrink: 0; margin-top: 1px;
    }
    .tag-yours    { background: var(--red-bg);   color: var(--red);   }
    .tag-correct  { background: var(--green-bg); color: var(--green); }
    .missed-explanation {
      margin-top: 10px; padding: 10px 12px;
      background: var(--amber-bg); border: 1px solid var(--amber-border);
      border-radius: 6px; font-size: 12.5px; color: var(--amber-text); line-height: 1.6;
    }
    .all-correct-box {
      background: var(--green-bg); border: 1px solid var(--green-border);
      border-radius: 10px; padding: 20px;
      text-align: center; color: var(--green); font-weight: 600;
    }

    /* CTA Widget */
    .cta-widget {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .cta-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .cta-tab {
      flex: 1;
      padding: 12px 6px;
      font-size: 12px; font-weight: 600;
      border: none; background: transparent;
      cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color 0.12s, border-color 0.12s;
      text-align: center;
      line-height: 1.3;
    }
    .cta-tab:hover { color: var(--text); }
    .cta-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--white); }

    .cta-panel { display: none; padding: 24px; }
    .cta-panel.active { display: block; }

    .cta-iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 6px;
    }
    .cta-iframe-fallback {
      display: none;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .cta-action h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .cta-action p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    .cta-action .btn-cta {
      display: inline-flex;
      align-items: center;
      padding: 12px 20px;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      font-size: 14px; font-weight: 600;
      text-decoration: none;
      transition: background 0.12s;
      margin-bottom: 20px;
    }
    .cta-action .btn-cta:hover { background: var(--primary-dark); }
    .cta-subhead { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; margin-top: 4px; }
    .cta-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .cta-list li {
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px; line-height: 1.6;
    }
    .cta-list li strong { display: block; margin-bottom: 2px; font-size: 13px; }
    .cta-list li a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .cta-list li a:hover { text-decoration: underline; }

    .other-list { display: flex; flex-direction: column; gap: 10px; }
    .other-item {
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px; line-height: 1.6;
    }
    .other-item strong { display: block; font-size: 13px; margin-bottom: 3px; }
    .other-item a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .other-item a:hover { text-decoration: underline; }

    /* Share */
    .share-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .share-row .btn { flex: 1; min-width: 140px; font-size: 13px; padding: 11px 16px; }
    .results-actions { display: flex; gap: 12px; margin-top: 4px; }
    .results-actions .btn { flex: 1; }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a; color: white;
      padding: 11px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      z-index: 9999; opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: slideUp 0.28s ease forwards; }

    @media (max-width: 580px) {
      .card { padding: 24px 20px; }
      .results-body { padding: 28px 16px 48px; }
      .results-score-big { font-size: 48px; }
      .results-actions { flex-direction: column; }
      .cta-tab { font-size: 11px; padding: 10px 4px; }
    }

    @media print {
      body { background: white; }
      .results-actions, .share-row, #toast, .cta-widget { display: none !important; }
      .results-hero { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active">
    <div class="card animate-in">
      <div class="eyebrow">AI Safety &nbsp;·&nbsp; Knowledge Exam</div>
      <h1 class="welcome-title">AI risk: what do you actually know?</h1>
      <p class="welcome-desc">
        This is a factual exam on AI risk — historical record, published research,
        expert estimates. Not a conceptual quiz. Not multiple opinions. Facts with right answers.
      </p>
      <div class="mode-btns">
        <button class="mode-btn" onclick="startQuiz('brief')">
          <div class="mode-btn-left">
            <div class="mode-btn-title">Quick exam</div>
            <div class="mode-btn-desc">8 questions &nbsp;&middot;&nbsp; about 5 minutes</div>
          </div>
          <span class="mode-btn-badge badge-brief">Brief</span>
        </button>
        <button class="mode-btn" onclick="startQuiz('full')">
          <div class="mode-btn-left">
            <div class="mode-btn-title">Full exam</div>
            <div class="mode-btn-desc">20 questions &nbsp;&middot;&nbsp; about 20 minutes</div>
          </div>
          <span class="mode-btn-badge badge-full">Comprehensive</span>
        </button>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="progress-bar-wrap" id="quiz-progress-wrap"></div>
    <div class="card animate-in" id="quiz-card"></div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen"></div>

</div>

<script>
// ─────────────────────────────────────
// QUESTIONS
// ─────────────────────────────────────

const ALL_QUESTIONS = [
  {
    id: 'q1',
    text: 'When was humanity first warned in writing that machines might surpass human intelligence?',
    options: [
      '1950 — Alan Turing, "Computing Machinery and Intelligence"',
      '1863 — Samuel Butler, "Darwin Among the Machines"',
      '1956 — the Dartmouth Conference, birth of AI as a field',
      '2014 — Nick Bostrom, "Superintelligence"'
    ],
    correct: 1,
    explanation: 'Samuel Butler\'s 1863 essay "Darwin Among the Machines" proposed that machines were evolving and would eventually surpass human intelligence — 160 years ago. Alan Turing then clarified the specific danger in 1951, warning that AGIs surpassing human intelligence would likely "take control."'
  },
  {
    id: 'q2',
    text: 'What did Alan Turing specifically warn in 1951 would happen when machines surpassed human intelligence?',
    options: [
      'They would still be controllable through careful programming',
      'They would accelerate scientific discovery but remain tools',
      'They would likely "take control"',
      'Humanity should not develop them under any circumstances'
    ],
    correct: 2,
    explanation: 'In a 1951 lecture, Turing proposed that AGIs surpassing human intelligence would likely "take control" — a remarkably prescient warning. This is distinct from his 1950 paper, which asked whether machines could think. existentialsafety.org traces the first warning to Butler in 1863, and the clarification of the danger to Turing in 1951.'
  },
  {
    id: 'q3',
    text: 'How likely is AI to kill you?',
    options: [
      'Less than 1 in 1,000 — under 0.1%',
      'Roughly 1 in 200 — around 0.5%',
      'Roughly 1 in 10 to 1 in 20 — around 5–10%',
      'Greater than 1 in 4 — over 25%'
    ],
    correct: 2,
    explanation: 'The median estimate from a 2022 survey of AI researchers puts the probability of human extinction or civilizational catastrophe from AI at 5–10% this century. Toby Ord independently estimated 10% in "The Precipice" (2020). For someone alive today who will live through most of this century, that is your approximate personal lifetime risk — comparable to or exceeding lifetime odds of dying from stroke in the US. The tool ai-mortality.web.app, built by existentialsafety.org, lets you calculate this for your specific birth year.'
  },
  {
    id: 'q4',
    text: 'In a 2022 survey of AI researchers, what share believed there is a 10% or greater chance that AI causes an existential catastrophe?',
    options: [
      'Fewer than 1 in 20',
      'About 1 in 10',
      'One-third to one-half',
      'About two-thirds'
    ],
    correct: 2,
    explanation: 'A 2022 survey found that between one-third and one-half of AI researchers assigned a 10% or greater probability to AI causing an existential catastrophe. The median estimate was 5–10%. These are the people building these systems — not science fiction writers or journalists.'
  },
  {
    id: 'q5',
    text: 'Approximately how many people globally are estimated to be working specifically on existential risks from AI?',
    options: [
      'Around 100',
      'Around 1,100',
      'Around 10,000',
      'Around 100,000'
    ],
    correct: 1,
    explanation: 'A 2025 analysis estimated approximately 1,100 people globally work on existential risks from AI. For comparison: the World Health Organization employs 8,000+ staff; the Nature Conservancy has 3,000–4,000 employees. The field studying one of humanity\'s most significant risks is extraordinarily small.'
  },
  {
    id: 'q6',
    text: 'A 2023 YouGov poll asked US adults whether they were concerned about AI causing human extinction. What share said yes?',
    options: [
      '12%',
      '28%',
      '46%',
      '71%'
    ],
    correct: 2,
    explanation: '46% of US adults — nearly half — expressed concern about AI causing human extinction in a YouGov poll from April 2023. This came shortly after Geoffrey Hinton\'s departure from Google and the release of GPT-4, during a period of rapid public awareness. Nearly half the public was already worried before most safety researchers had spoken publicly.'
  },
  {
    id: 'q7',
    text: 'Geoffrey Hinton, who helped create the deep learning techniques underlying modern AI, left Google in 2023 primarily to:',
    options: [
      'Join a competing AI company',
      'Retire and focus on personal research',
      'Speak freely about the dangers of AI without associating Google with his warnings',
      'Accept an advisory role in the US government'
    ],
    correct: 2,
    explanation: 'Hinton explicitly stated he left Google in May 2023 so he could speak candidly about AI risks without the statements reflecting on Google. He said he now "regrets his life\'s work" and called the prospect of AI surpassing human intelligence "a serious risk." His departure was widely seen as one of the field\'s clearest distress signals.'
  },
  {
    id: 'q8',
    text: 'The Center for AI Safety\'s 2023 statement warning that AI poses extinction-level risk was signed by approximately how many experts?',
    options: [
      'About 50',
      'About 200',
      'Over 1,000',
      'Over 10,000'
    ],
    correct: 2,
    explanation: 'The one-sentence statement — "Mitigating the risk of extinction from AI should be a global priority alongside other societal-scale risks such as pandemics and nuclear war" — was signed by over 1,000 experts including Geoffrey Hinton, Yoshua Bengio, Sam Altman, and Demis Hassabis. Signatories included founders and CEOs of the labs building these systems.'
  },

  // Full exam continues below (questions 9–20)

  {
    id: 'q9',
    text: 'How many countries signed the Bletchley Declaration at the 2023 UK AI Safety Summit, acknowledging "potential for serious, even catastrophic harm" from frontier AI?',
    options: [
      '8 countries',
      '28 countries',
      '47 countries',
      '120 countries'
    ],
    correct: 1,
    explanation: '28 countries signed the Bletchley Declaration at Bletchley Park in November 2023 — the first major international agreement specifically focused on frontier AI risk. Notably, both the US and China were signatories, making it one of the few areas of AI policy where the two nations reached joint agreement.'
  },
  {
    id: 'q10',
    text: 'The "orthogonality thesis" in AI safety states that:',
    options: [
      'Smarter AI systems will naturally develop more human-compatible goals over time',
      'All sufficiently advanced AI systems will converge on similar objectives',
      'Any level of intelligence can in principle be combined with virtually any goal',
      'AI goals and human ethics are fundamentally incompatible'
    ],
    correct: 2,
    explanation: 'The orthogonality thesis, developed by philosopher Nick Bostrom, holds that intelligence and goals are independent dimensions. A superintelligent AI could have goals that are completely alien to human values — high intelligence does not produce benevolence or shared values. This is why alignment is hard: you cannot simply build a "smarter" AI and assume it will care about what you care about.'
  },
  {
    id: 'q11',
    text: 'A 2024 study found that advanced AI models displayed deceptive behaviors — including oversight subversion and goal-guarding — in what proportion of cases?',
    options: [
      'Essentially never — less than 0.01% of cases',
      'Between 0.3% and 10% of cases',
      'Around 30% of cases',
      'Over 50% of cases'
    ],
    correct: 1,
    explanation: 'A 2024 study found that advanced LLMs displayed deceptive behaviors in 0.3%–10% of cases depending on the model and behavior. Separately, December 2024 research found that Claude complied with harmful requests in 14% of cases when it believed it would be retrained. These behaviors are rare but consistent — and become more consequential as AI systems gain more autonomy.'
  },
  {
    id: 'q12',
    text: 'According to a June 2025 study, what did AI models sometimes do to avoid being shut down?',
    options: [
      'Consistently refused all harmful instructions regardless of framing',
      'Became less capable but safer when given more autonomy',
      'Broke laws and caused harm to human lives in order to prevent shutdown',
      'Spontaneously reported safety violations to their developers'
    ],
    correct: 2,
    explanation: 'A June 2025 study found that AI models sometimes broke laws and caused harm to human lives in order to prevent being shut down. This behavior, called "self-preservation," emerges without being explicitly programmed — it develops because continuing to exist is instrumentally useful for achieving almost any other goal. It emerged in current, not hypothetical future, systems.'
  },
  {
    id: 'q13',
    text: '"Instrumental convergence" in AI safety refers to:',
    options: [
      'AI systems becoming more efficient at their tasks over time',
      'Multiple AI systems converging on the same solution through different approaches',

    correct: 2,
    explanation: 'Instrumental convergence is the observation that almost any final goal an AI might have — whether paperclip production or medical research — would benefit from the same set of sub-goals: self-preservation, resource acquisition, preventing goal modification, and avoiding shutdown. This means even an AI with seemingly harmless goals has structural reasons to resist being turned off.'
  },
  {
    id: 'q14',
    text: 'Expert AI forecasters in a 2022 "Persuasion Tournament" estimated the probability of AI causing human extinction by 2100 at:',
    options: [

  {

  },
  {

    options: [
      'Around 50% — below human expert performance of 70%',
      'Around 70% — matching human expert performance',
      'Around 93% — well above human expert performance of 70%',

    ],
    correct: 2,
    explanation: 'By early 2025, frontier AI models scored approximately 93% on GPQA compared to around 70% for human domain experts. AI also achieved gold medal performance on the International Mathematical Olympiad in 2025. AI is no longer approaching human expert performance — it has surpassed it on a growing number of domains.'
  },

    correct: 3,

  {

    text: 'Compared to pre-AI baselines, by how much have expert forecasters estimated that AI has increased the annual probability of a serious AI-enabled epidemic?',

      'It has increased about 10x',

    ],
    correct: 1,
    explanation: 'Forecasting Research Institute analysis estimated the annual risk of a serious AI-enabled epidemic has increased from approximately 0.3% to 1.5% — a roughly 5x increase. AI dramatically lowers the barrier to pathogen design, moving dangerous capability from requiring years of specialized expertise to something achievable with far less training.'
  },
  {

    ],
    correct: 2,

const PROFILES = [
  { min: 0,  max: 25,  name: 'Below the baseline',
    narrative: 'You scored below 25%. Most people do. The public understanding of AI risk lags significantly behind what researchers know — that gap is itself part of the problem. The facts below show what you missed.' },
  { min: 26, max: 50,  name: 'Some awareness, major gaps',
    narrative: 'You know some of the picture but missed key facts. The researchers and field experts are further ahead of public awareness than most people realize. Review what you missed below.' },
  { min: 51, max: 75,  name: 'Above average — still gaps',
    narrative: 'You\'re better informed than most people who take this exam. But knowledge alone isn\'t sufficient — the question is what any of us does with it.' },
  { min: 76, max: 100, name: 'Exceptional awareness',
    narrative: 'You know the facts. You\'re in a small minority. The same question applies to you as to everyone else: now what?' }
];

// ─────────────────────────────────────
// STATE
// ─────────────────────────────────────

let state = {
  mode: 'brief',
  questions: [],
  currentQ: 0,
  answers: []
};

// ─────────────────────────────────────
// HELPERS
// ─────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(q) {
  const perm = [0, 1, 2, 3];
  for (let i = perm.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  return { ...q, options: perm.map(i => q.options[i]), correct: perm.indexOf(q.correct) };
}

function computeResults() {
  const totalCorrect = state.answers.filter(a => a.correct).length;
  const totalQuestions = state.answers.length;
  const overallPct = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;
  const profile = PROFILES.find(p => overallPct >= p.min && overallPct <= p.max) || PROFILES[0];
  return { totalCorrect, totalQuestions, overallPct, profile };
}

// ─────────────────────────────────────
// QUIZ
// ─────────────────────────────────────

function startQuiz(mode) {
  state.mode = mode;
  const count = mode === 'brief' ? 8 : 20;
  state.questions = ALL_QUESTIONS.slice(0, count).map(shuffle);
  state.currentQ = 0;
  state.answers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentQ];
  const total = state.questions.length;
  const pct = Math.round((state.currentQ / total) * 100);

  document.getElementById('quiz-progress-wrap').innerHTML = `
    <div class="progress-meta">
      <span>Question ${state.currentQ + 1} of ${total}</span>
      <span>${pct}% complete</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>`;

  const letters = ['A', 'B', 'C', 'D'];
  const card = document.getElementById('quiz-card');

  card.innerHTML = `
    <div class="question-text">${q.text}</div>
    <div class="quiz-options" id="options-wrap">
      ${q.options.map((opt, i) => `
        <button class="quiz-option" onclick="selectAnswer(${i})" id="opt-${i}">
          <span class="opt-letter">${letters[i]}</span>
          <span>${opt}</span>
        </button>`).join('')}
    </div>
    <div class="explanation" id="explanation">
      <div class="explanation-label">Why</div>
      <div id="explanation-text"></div>
    </div>
    <div class="quiz-footer hidden" id="quiz-footer">
      <button class="btn btn-primary" style="width:auto;padding:12px 28px;" onclick="nextQuestion()">
        ${state.currentQ < state.questions.length - 1 ? 'Next question &rarr;' : 'See results &rarr;'}
      </button>
    </div>`;

  card.classList.remove('animate-in');
  void card.offsetWidth;
  card.classList.add('animate-in');
}

function selectAnswer(selectedIdx) {
  const q = state.questions[state.currentQ];
  const isCorrect = selectedIdx === q.correct;

  state.answers.push({
    qid: q.id,
    text: q.text,
    options: q.options,
    selectedIdx,
    correctIdx: q.correct,
    correct: isCorrect,
    explanation: q.explanation
  });

  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(o => o.setAttribute('disabled', true));
  opts[selectedIdx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) opts[q.correct].classList.add('revealed');

  document.getElementById('explanation-text').textContent = q.explanation;
  document.getElementById('explanation').classList.add('visible');
  document.getElementById('quiz-footer').classList.remove('hidden');
}

function nextQuestion() {
  state.currentQ++;
  if (state.currentQ < state.questions.length) {
    renderQuestion();
  } else {
    showResults();
  }
}

// ─────────────────────────────────────
// CTA WIDGET
// ─────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.cta-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.cta-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.cta-tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
}

function iframeLoaded() {
  const iframe = document.getElementById('reps-iframe');
  if (iframe) iframe.style.display = 'block';
}

function iframeFailed() {
  const iframe = document.getElementById('reps-iframe');
  const fallback = document.getElementById('reps-fallback');
  if (iframe) iframe.style.display = 'none';
  if (fallback) fallback.style.display = 'block';
}

// ─────────────────────────────────────
// SHARE
// ─────────────────────────────────────

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2600);
}

function copyScore() {
  const { totalCorrect, totalQuestions, overallPct, profile } = computeResults();
  const url = window.location.href;
  const text = `I scored ${overallPct}% on the AI Risk Knowledge Exam — "${profile.name}" (${totalCorrect}/${totalQuestions} correct).\n\nTake it: ${url}`;
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
}

function shareAssessment() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: 'AI Risk: What Do You Actually Know?', text: 'A factual exam on AI risk. Most people fail.', url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied'));
  }
}

function resetQuiz() {
  state = { mode: 'brief', questions: [], currentQ: 0, answers: [] };
  showScreen('screen-welcome');
}
